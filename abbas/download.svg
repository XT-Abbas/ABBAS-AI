<svg xmlns="http://www.w3.org/2000/svg" width="150" height="40">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="5" y="5" width="140" height="30" rx="15" fill="#1e1e2e" stroke="#f093fb" stroke-width="2" filter="url(#glow)">
     <animate attributeName="stroke" values="#f093fb;#f5576c;#f093fb" dur="2s" repeatCount="indefinite" />
  </rect>
  <text x="75" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f093fb" text-anchor="middle">
     <tspan>⬇ Download ZIP</tspan>
     <animate attributeName="fill" values="#f093fb;#ffffff;#f093fb" dur="2s" repeatCount="indefinite" />
  </text>
</svg>
