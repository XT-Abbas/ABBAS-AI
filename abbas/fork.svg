<svg xmlns="http://www.w3.org/2000/svg" width="140" height="40">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="5" y="5" width="130" height="30" rx="15" fill="#1e1e2e" stroke="#00f2fe" stroke-width="2" filter="url(#glow)">
     <animate attributeName="stroke" values="#00f2fe;#4facfe;#00f2fe" dur="2s" repeatCount="indefinite" />
  </rect>
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#00f2fe" text-anchor="middle">
     <tspan>⑂ Fork Repo</tspan>
     <animate attributeName="fill" values="#00f2fe;#ffffff;#00f2fe" dur="2s" repeatCount="indefinite" />
  </text>
</svg>
