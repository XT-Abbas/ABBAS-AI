<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="4" viewBox="0 0 1000 4" preserveAspectRatio="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#4facfe;#00f2fe" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#4facfe">
        <animate attributeName="stop-color" values="#4facfe;#f093fb;#4facfe" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#f093fb">
        <animate attributeName="stop-color" values="#f093fb;#f5576c;#f093fb" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="4" fill="url(#grad)" rx="2" />
</svg>
