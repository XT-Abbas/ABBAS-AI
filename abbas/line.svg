<svg width="100%" height="8" viewBox="0 0 100 8" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rgbMove" x1="0%" x2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color"
          values="#ff0000;#00ff00;#0000ff;#ff00ff;#00ffff;#ffff00;#ff0000"
          dur="3s"
          repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color"
          values="#00ffff;#ff00ff;#ffff00;#0000ff;#00ff00;#ff0000;#00ffff"
          dur="3s"
          repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="100%" height="8" fill="url(#rgbMove)" rx="4">
    <animate attributeName="x" values="-100;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>